<svg width="1800" height="1280" viewBox="0 0 1800 1280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1800" y2="1280" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F3EC"/>
      <stop offset="1" stop-color="#EAF2F8"/>
    </linearGradient>
    <linearGradient id="deviceBg" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#D4E4EE"/>
      <stop offset="1" stop-color="#C6DAE9"/>
    </linearGradient>
    <filter id="cardShadow" x="-20%" y="-20%" width="160%" height="180%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#26425C" flood-opacity="0.14"/>
    </filter>
    <filter id="artShadow" x="-20%" y="-20%" width="160%" height="180%">
